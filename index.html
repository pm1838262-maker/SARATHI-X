<!DOCTYPE html>
<html>

<head>

  <title>SARATHI X</title>

  <style>

body{
  background: radial-gradient(circle, #1a0000, #000000);
  color: orange;
  text-align: center;
  margin-top: 100px;
  font-family: Arial;
}

h1{
  font-size: 55px;
  text-shadow: 0 0 10px orange,
               0 0 20px orange,
               0 0 40px #ff6600;
  animation: glow 2s infinite alternate;
}

p{
  color: #ffb347;
  font-size: 18px;
}

button{
  padding:15px 30px;
  background: linear-gradient(45deg,#ff6600,#ff9900);
  border:none;
  border-radius:12px;
  color:black;
  font-weight:bold;
  font-size:18px;
  cursor:pointer;
  box-shadow: 0 0 15px orange;
  transition: 0.3s;
}

button:hover{
  transform: scale(1.08);
  box-shadow: 0 0 30px orange;
}

@keyframes glow{
  from{
    text-shadow: 0 0 10px orange;
  }
  to{
    text-shadow: 0 0 20px orange,
                 0 0 40px #ff6600,
                 0 0 60px #ff3300;
  }
}

  </style>

</head>

<body>

  <h1>SARATHI X</h1>

  <p>Advanced Futuristic AI Operating System</p>

  <button>
    ACTIVATE GOD MODE
  </button>
<script>

const button = document.querySelector("button");

button.addEventListener("click", () => {

  alert("⚡ SARATHI X ACTIVATED ⚡");

});

</script>
</body>
</html>
